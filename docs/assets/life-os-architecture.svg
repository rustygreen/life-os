<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-label="Life OS architecture diagram">
  <defs>
    <style>
      .title { font: 700 34px Arial, sans-serif; fill: #0f172a; }
      .label { font: 600 18px Arial, sans-serif; fill: #0f172a; }
      .small { font: 500 14px Arial, sans-serif; fill: #334155; }
      .box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 14; }
      .db { fill: #eef6ff; stroke: #5b8def; stroke-width: 2; rx: 14; }
      .ai { fill: #f4ecff; stroke: #8b5cf6; stroke-width: 2; rx: 14; }
      .ops { fill: #ecfdf5; stroke: #16a34a; stroke-width: 2; rx: 14; }
      .arrow { stroke: #475569; stroke-width: 2.2; marker-end: url(#arrowhead); fill: none; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569" />
    </marker>
  </defs>

  <rect x="0" y="0" width="1280" height="720" fill="#f8fafc"/>
  <text x="50" y="58" class="title">Life OS Runtime Architecture</text>

  <rect x="80" y="120" width="220" height="92" class="box"/>
  <text x="150" y="162" class="label">Web UI</text>
  <text x="126" y="188" class="small">React + Vite</text>

  <rect x="360" y="120" width="240" height="92" class="box"/>
  <text x="428" y="162" class="label">API Service</text>
  <text x="392" y="188" class="small">Auth, Timeline, Quick Add</text>

  <rect x="640" y="120" width="220" height="92" class="ai"/>
  <text x="710" y="162" class="label">Hermes</text>
  <text x="682" y="188" class="small">AI Router + Parsing</text>

  <rect x="920" y="100" width="300" height="120" class="db"/>
  <text x="1014" y="150" class="label">PostgreSQL</text>
  <text x="970" y="176" class="small">Canonical source of truth</text>

  <rect x="360" y="290" width="240" height="92" class="box"/>
  <text x="438" y="332" class="label">Worker</text>
  <text x="418" y="358" class="small">Jobs + Enrichment</text>

  <rect x="640" y="290" width="220" height="92" class="ops"/>
  <text x="676" y="332" class="label">Postgres Backup</text>
  <text x="680" y="358" class="small">Automated snapshots</text>

  <rect x="920" y="280" width="300" height="110" class="box"/>
  <text x="1030" y="328" class="label">Redis</text>
  <text x="998" y="354" class="small">Queue + transient state</text>

  <rect x="360" y="480" width="500" height="120" class="ops"/>
  <text x="540" y="526" class="label">Ops Monitor</text>
  <text x="430" y="552" class="small">Health checks (API/Web/Hermes) + backup freshness alerts</text>

  <path class="arrow" d="M300 166 L360 166"/>
  <path class="arrow" d="M600 166 L640 166"/>
  <path class="arrow" d="M600 182 L920 160"/>
  <path class="arrow" d="M860 166 L920 160"/>
  <path class="arrow" d="M600 336 L920 336"/>
  <path class="arrow" d="M600 320 L920 190"/>
  <path class="arrow" d="M860 320 L920 190"/>
  <path class="arrow" d="M610 480 L480 212"/>
  <path class="arrow" d="M660 480 L750 212"/>
  <path class="arrow" d="M740 480 L750 382"/>
</svg>
