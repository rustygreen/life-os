<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-label="Life OS architecture diagram">
  <defs>
    <style>
      .title { font: 700 34px Arial, sans-serif; fill: #0f172a; }
      .label { font: 600 18px Arial, sans-serif; fill: #0f172a; }
      .small { font: 500 14px Arial, sans-serif; fill: #334155; }
      .box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 14; }
      .db { fill: #eef6ff; stroke: #5b8def; stroke-width: 2; rx: 14; }
      .ai { fill: #f4ecff; stroke: #8b5cf6; stroke-width: 2; rx: 14; }
      .ops { fill: #ecfdf5; stroke: #16a34a; stroke-width: 2; rx: 14; }
      .arrow { stroke: #475569; stroke-width: 2.2; marker-end: url(#arrowhead); fill: none; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569" />
    </marker>
  </defs>

  <rect x="0" y="0" width="1280" height="720" fill="#f8fafc"/>
  <text x="50" y="58" class="title">Life OS Runtime Architecture</text>

  <rect x="80" y="150" width="220" height="96" class="box"/>
  <text x="150" y="194" class="label">Web UI</text>
  <text x="126" y="220" class="small">React + Vite</text>

  <rect x="360" y="150" width="240" height="96" class="box"/>
  <text x="428" y="194" class="label">API Service</text>
  <text x="392" y="220" class="small">Auth, Timeline, Quick Add</text>

  <rect x="660" y="150" width="300" height="96" class="db"/>
  <text x="756" y="194" class="label">PostgreSQL</text>
  <text x="722" y="220" class="small">Canonical source of truth</text>

  <rect x="360" y="330" width="220" height="96" class="ai"/>
  <text x="430" y="374" class="label">Hermes</text>
  <text x="402" y="400" class="small">AI Router + Parsing</text>

  <rect x="80" y="330" width="220" height="96" class="box"/>
  <text x="158" y="374" class="label">Worker</text>
  <text x="138" y="400" class="small">Jobs + Enrichment</text>

  <rect x="660" y="330" width="220" height="96" class="box"/>
  <text x="738" y="374" class="label">Redis</text>
  <text x="706" y="400" class="small">Queue + transient state</text>

  <rect x="940" y="330" width="260" height="96" class="ops"/>
  <text x="996" y="374" class="label">Postgres Backup</text>
  <text x="984" y="400" class="small">Automated snapshots</text>

  <rect x="80" y="510" width="1120" height="120" class="ops"/>
  <text x="550" y="556" class="label">Ops Monitor</text>
  <text x="132" y="582" class="small">Checks API, Web, Hermes, and backup freshness. Worker also persists processed facts to PostgreSQL.</text>

  <path class="arrow" d="M300 198 L360 198"/>
  <path class="arrow" d="M600 198 L660 198"/>
  <path class="arrow" d="M480 246 L480 330"/>
  <path class="arrow" d="M300 378 L660 378"/>
  <path class="arrow" d="M940 378 L960 378 L960 246"/>
</svg>
