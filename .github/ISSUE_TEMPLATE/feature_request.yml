name: Feature request
description: Suggest an improvement or new capability
title: "feature: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Share the outcome you want and why it matters.

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What user problem does this solve?
      placeholder: Describe the pain point.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should be added or changed?
      placeholder: Describe your proposed approach.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other options you evaluated.

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Links, examples, mockups, or references.
